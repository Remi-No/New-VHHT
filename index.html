<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOPIK 96 읽기 - Trắc nghiệm</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f1e8;color:#1f2937;font-family:Arial,'Noto Sans KR',sans-serif;line-height:1.6}
.top-line{height:10px;background:#0f766e}
.header{padding:34px 6vw;background:#f3efe7;border-bottom:1px solid #ddd4c5}
.header-top{display:flex;justify-content:space-between;gap:22px;flex-wrap:wrap;align-items:flex-start}
.title h1{font-size:clamp(30px,4vw,54px);font-weight:800;margin-bottom:8px;letter-spacing:-1px}
.title p{font-size:clamp(15px,1.6vw,19px);color:#6b7280;max-width:900px}
.stats{display:flex;gap:12px;flex-wrap:wrap}
.stat{background:white;border-radius:999px;padding:12px 20px;font-weight:bold;font-size:17px;border:1px solid #e7dfd2;box-shadow:0 6px 18px rgba(0,0,0,.04)}
.progress-wrap{margin-top:24px;width:560px;max-width:100%;height:15px;background:#ddd2be;border-radius:999px;overflow:hidden}
.progress-bar{width:0%;height:100%;background:#9a6a37;transition:.3s}
.main{padding:32px 6vw}
.toolbar{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:26px;align-items:center}
.search{flex:1;min-width:260px}
.search input{width:100%;padding:16px 18px;border-radius:18px;border:2px solid #ddd4c5;font-size:17px;background:white;outline:none}
.btn{border:none;background:#1f2a44;color:white;border-radius:16px;padding:14px 20px;font-size:16px;font-weight:bold;cursor:pointer;transition:.2s}
.btn:hover{transform:translateY(-1px)}
.btn.reset{background:#9a6a37}
.question{background:#fffefa;border:2px solid #ddd4c5;border-radius:26px;padding:26px;margin-bottom:24px;box-shadow:0 8px 24px rgba(90,60,20,.04)}
.question-title{font-size:21px;line-height:1.75;margin-bottom:18px;white-space:pre-wrap}
.num{color:#9a6a37;font-weight:bold}
.options{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.option{background:white;border:2px solid #ddd;border-radius:18px;padding:16px;font-size:18px;cursor:pointer;transition:.2s;text-align:left;line-height:1.55}
.option:hover{background:#f3f4f6}
.option.correct{background:#dcfce7;border-color:#22c55e;color:#166534;font-weight:bold}
.option.wrong{background:#fee2e2;border-color:#ef4444;color:#b91c1c}
.result{margin-top:16px;padding:12px 16px;border-radius:14px;font-size:18px;font-weight:bold;display:none}
.result.correct{background:#dcfce7;color:#166534}
.result.wrong{background:#fee2e2;color:#b91c1c}
.hidden{display:none}
.footer-note{color:#6b7280;text-align:center;margin:30px 0}
@media(max-width:900px){.header,.main{padding:22px}.options{grid-template-columns:1fr}.option{font-size:16px}.btn{width:100%}}
@media print{.toolbar,.top-line{display:none}body{background:white}.question{break-inside:avoid}}
</style>
</head>
<body>
<div class="top-line"></div>

<div class="header">
  <div class="header-top">
    <div class="title">
      <h1>TOPIK 96 읽기 - Trắc nghiệm</h1>
      <p>Chọn đáp án để xem đúng/sai. Sai không hiện đáp án đúng, được chọn lại đến khi đúng.</p>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </div>
    <div class="stats">

      <div class="stat">Đúng: <span id="correct">0</span></div>
      <div class="stat">Sai: <span id="wrong">0</span></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="toolbar">
    <div class="search"><input id="searchInput" type="text" placeholder="Tìm câu hỏi hoặc đáp án..." /></div>
    <button class="btn" id="printBtn">In trang</button>
    <button class="btn" id="shuffleQuestionsBtn">Xáo trộn câu hỏi</button>
    <button class="btn reset" id="resetBtn">Làm lại</button>
  </div>

  <div id="quiz"></div>
  <div class="footer-note">Câu 42-43 trong file gốc có thông báo không công khai đoạn văn do bản quyền.</div>
</div>

let currentQuestions = [];
let answered = {};
let done = 0;
let correct = 0;
let wrong = 0;

const quiz = document.getElementById("quiz");
const searchInput = document.getElementById("searchInput");

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function shuffleArray(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function resetQuiz(){
  done = 0;
  correct = 0;
  wrong = 0;
  answered = {};
  currentQuestions = questions.map((q,i)=>({...q, id:i}));
  searchInput.value = "";
  renderQuiz();
  updateStats();
}

function renderQuiz(){
  quiz.innerHTML = "";
  currentQuestions.forEach((item,index)=>{
    const q = document.createElement("div");
    q.className = "question";
    q.dataset.search = (item.q + " " + item.opts.join(" ")).toLowerCase();

    const optionsHtml = item.opts.map((opt,i)=>`
      <button type="button" class="option" data-q-index="${index}" data-index="${i}">
        ${String.fromCharCode(9312+i)} ${escapeHtml(opt)}
      </button>
    `).join("");

    q.innerHTML = `
      <div class="question-title"><span class="num">${item.id+1}.</span> ${escapeHtml(item.q)}</div>
      <div class="options">${optionsHtml}</div>
      <div class="result" id="result-${index}"></div>
    `;
    quiz.appendChild(q);
  });
}

function checkAnswer(el, qIndex, selectedIndex){
  const item = currentQuestions[qIndex];
  const resultBox = document.getElementById(`result-${qIndex}`);
  const optionList = el.closest(".options").querySelectorAll(".option");

  optionList.forEach(option=>{
    option.classList.remove("wrong");
    option.classList.remove("correct");
  });

  if(selectedIndex === item.answer){
    el.classList.add("correct");
    resultBox.style.display = "block";
    resultBox.className = "result correct";
    resultBox.innerHTML = "✅ Chính xác";

    if(!answered[item.id]){
      answered[item.id] = true;
      done++;
      correct++;
      updateStats();
    }
  } else {
    el.classList.add("wrong");
    resultBox.style.display = "block";
    resultBox.className = "result wrong";
    resultBox.innerHTML = "❌ Sai rồi, hãy chọn lại";
    wrong++;
    updateStats();
    setTimeout(()=>el.classList.remove("wrong"),650);
  }
}

function updateStats(){
  document.getElementById("done").innerText = done;
  document.getElementById("correct").innerText = correct;
  document.getElementById("wrong").innerText = wrong;
  document.getElementById("total").innerText = questions.length;
  document.getElementById("progressBar").style.width = ((done/questions.length)*100) + "%";
}

function filterQuestions(){
  const keyword = searchInput.value.trim().toLowerCase();
  document.querySelectorAll(".question").forEach(q=>{
    q.classList.toggle("hidden", keyword && !q.dataset.search.includes(keyword));
  });
}

function shuffleQuestions(){
  currentQuestions = shuffleArray(currentQuestions);
  renderQuiz();
  filterQuestions();
}

quiz.addEventListener("click", event=>{
  const option = event.target.closest(".option");
  if(!option) return;
  checkAnswer(option, Number(option.dataset.qIndex), Number(option.dataset.index));
});

searchInput.addEventListener("input", filterQuestions);
document.getElementById("printBtn").addEventListener("click",()=>window.print());
document.getElementById("shuffleQuestionsBtn").addEventListener("click",shuffleQuestions);
document.getElementById("resetBtn").addEventListener("click",resetQuiz);

resetQuiz();
</script>
