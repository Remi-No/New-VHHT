<head>

<title>TOPIK 96 읽기 - Giải thích tiếng Việt</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f2f2f2;font-family:Arial,"Malgun Gothic",sans-serif;color:#111;line-height:1.75}
.container{max-width:1080px;margin:auto;padding:26px}
.header{background:white;border:1px solid #ddd;padding:28px;margin-bottom:26px}
.header h1{font-size:clamp(30px,4vw,46px);margin-bottom:8px}
.header p{font-size:18px;color:#555}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
.stat{background:#fffefa;border:1px solid #ddd;border-radius:999px;padding:10px 18px;font-weight:bold}
.progress{height:14px;background:#ddd;margin-top:16px;border-radius:999px;overflow:hidden}
.bar{height:100%;width:0%;background:#0f766e;transition:.3s}
.toolbar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.search{flex:1;min-width:260px}
.search input{width:100%;padding:14px;border:1px solid #ccc;border-radius:12px;font-size:17px}
.btn{border:none;border-radius:12px;padding:14px 18px;background:#1f2a44;color:#fff;font-weight:bold;cursor:pointer}
.btn.reset{background:#9a6a37}
.block{background:white;border:1px solid #ddd;padding:30px;margin-bottom:34px}
.section-title{font-size:23px;font-weight:bold;margin-bottom:18px}
.reading{border:3px solid #444;padding:23px;font-size:23px;line-height:2.05;margin-bottom:26px;white-space:pre-wrap;background:#fff;font-family:"Malgun Gothic",Arial,sans-serif}
.question-title{font-size:22px;font-weight:bold;margin-bottom:16px;white-space:pre-wrap;font-family:"Malgun Gothic",Arial,sans-serif}
.options{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.option{border:2px solid #d7d7d7;border-radius:14px;padding:15px;background:white;cursor:pointer;font-size:19px;text-align:left;line-height:1.55;font-family:"Malgun Gothic",Arial,sans-serif}
.option:hover{background:#f9f9f9}
.option.correct{background:#dcfce7;border-color:#16a34a;color:#166534;font-weight:bold}
.option.wrong{background:#fee2e2;border-color:#dc2626;color:#991b1b}
.result{margin-top:15px;font-size:20px;font-weight:bold}
.explain{display:none;margin-top:15px;padding:20px;background:#eff6ff;border-left:6px solid #2563eb;border-radius:12px;font-size:18px}
.explain b{color:#1d4ed8}
.hidden{display:none}
@media(max-width:800px){.container{padding:14px}.block{padding:18px}.reading{font-size:18px;line-height:1.85}.options{grid-template-columns:1fr}.option{font-size:16px}}
@media print{.toolbar{display:none}body{background:white}.block{break-inside:avoid}}
</style>

<p>Giải thích hoàn toàn bằng tiếng Việt • Chọn đúng mới hiện giải thích • Sai không hiện đáp án đúng</p>

<script>
const questions = [{"n": 1, "section": "※ [1~2] (     )에 들어갈 말로 가장 알맞은 것을 고르십시오.", "reading": "", "q": "감기약을 (     ) 열이 내렸다.", "o": ["먹더라도", "먹느라고", "먹을 텐데", "먹고 나서"], "a": 3, "ex": "Câu này nghĩa là: “Sau khi uống thuốc cảm thì sốt đã hạ.” Đúng là ④ 먹고 나서 vì -고 나서 diễn tả hành động thứ nhất kết thúc rồi hành động/kết quả tiếp theo xảy ra. ① 먹더라도 = dù uống, không hợp kết quả trực tiếp. ② 먹느라고 thường dùng cho nguyên nhân dẫn đến kết quả không tốt. ③ 먹을 텐데 là phỏng đoán/dự đoán, không hợp."}, {"n": 2, "section": "※ [1~2] (     )에 들어갈 말로 가장 알맞은 것을 고르십시오.", "reading": "", "q": "내일 김밥을 만들려고 재료를 미리 (     ).", "o": ["준비하곤 했다", "준비해 놓았다", "준비하는 법이다", "준비하면 된다"], "a": 1, "ex": "Đúng là ② 준비해 놓았다. Câu nghĩa là: “Để ngày mai làm kimbap nên đã chuẩn bị sẵn nguyên liệu trước.” -아/어 놓다 diễn tả làm sẵn và trạng thái đó còn duy trì. Các đáp án khác không nhấn mạnh ý chuẩn bị sẵn."}, {"n": 3, "section": "※ [3~4] 밑줄 친 부분과 의미가 가장 비슷한 것을 고르십시오.", "reading": "", "q": "버스를 잘못 타는 바람에 수업에 늦었다.", "o": ["타는 김에", "탄 탓에", "타는 대신에", "탄 반면에"], "a": 1, "ex": "Đúng là ② 탄 탓에. -는 바람에 diễn tả nguyên nhân gây kết quả không tốt: vì lên nhầm xe buýt nên trễ học. -탓에 cũng nghĩa là do/vì nguyên nhân xấu."}, {"n": 4, "section": "※ [3~4] 밑줄 친 부분과 의미가 가장 비슷한 것을 고르십시오.", "reading": "", "q": "회의가 길어져서 약속 시간을 미뤄야만 했다.", "o": ["미룰 줄 몰랐다", "미루기만 했다", "미룰 수밖에 없었다", "미루기가 어려웠다"], "a": 2, "ex": "Đúng là ③ 미룰 수밖에 없었다. 미뤄야만 했다 nghĩa là bắt buộc phải dời lịch. -을/ㄹ 수밖에 없다 nghĩa là không còn cách nào khác ngoài việc đó."}, {"n": 5, "section": "※ [5~8] 다음은 무엇에 대한 글인지 고르십시오.", "reading": "덮자마자 꿈나라로~\n아침까지 포근하고 따뜻하게!", "q": "이 글은 무엇에 대한 글입니까?", "o": ["장갑", "이불", "화장품", "손수건"], "a": 1, "ex": "Đúng là ② 이불. Từ khóa 덮다 = đắp, 포근하고 따뜻하게 = ấm áp, dễ chịu. Nội dung quảng cáo thứ dùng để đắp khi ngủ, tức chăn/mền."}, {"n": 6, "section": "※ [5~8] 다음은 무엇에 대한 글인지 고르십시오.", "reading": "오늘의 추억을 한 장에\n아름다운 모습 그대로 남기세요.", "q": "이 글은 무엇에 대한 글입니까?", "o": ["은행", "서점", "빨래방", "사진관"], "a": 3, "ex": "Đúng là ④ 사진관. ‘추억을 한 장에 남기다’ nghĩa là lưu giữ kỷ niệm trong một tấm ảnh. Vì vậy đây là tiệm chụp ảnh."}, {"n": 7, "section": "※ [5~8] 다음은 무엇에 대한 글인지 고르십시오.", "reading": "학교 앞 천천히!\n아이들이 있는지 한 번 더 살피세요.", "q": "이 글은 무엇에 대한 글입니까?", "o": ["건강 관리", "안전 운전", "전기 절약", "환경 보호"], "a": 1, "ex": "Đúng là ② 안전 운전. Câu nhắc đi chậm trước trường học và quan sát trẻ em, nên chủ đề là lái xe an toàn."}, {"n": 8, "section": "※ [5~8] 다음은 무엇에 대한 글인지 고르십시오.", "reading": "① 식사를 원하는 날짜와 시간, 인원수를 선택하십시오.\n② 연락 받을 분의 성함과 연락처를 입력하십시오.", "q": "이 글은 무엇에 대한 글입니까?", "o": ["일정 문의", "예약 방법", "이용 후기", "제품 소개"], "a": 1, "ex": "Đúng là ② 예약 방법. Nội dung hướng dẫn chọn ngày, giờ, số người và nhập thông tin liên lạc, đây là quy trình đặt chỗ/đặt bàn."}, {"n": 9, "section": "※ [9~12] 다음 글 또는 그래프의 내용과 같은 것을 고르십시오.", "reading": "제3회 인주시 영상 노래 대회\n제출 방법: 노래하는 영상과 신청서를 이메일로 전송\n신청서는 인주시청 홈페이지 게시판에서 다운로드 가능\n제출 기간: 11월 1일~15일\n결과 발표: 11월 29일, 인주시청 홈페이지 게시", "q": "내용과 같은 것을 고르십시오.", "o": ["결과는 이메일로 알려 준다.", "11월 29일까지 신청서를 내야 한다.", "신청서는 홈페이지에서 내려받을 수 있다.", "노래하는 영상은 직접 가서 제출해야 한다."], "a": 2, "ex": "Đúng là ③. Trong thông báo có câu 신청서는 홈페이지에서 다운로드 가능, nghĩa là có thể tải đơn đăng ký từ trang web. Kết quả đăng trên homepage, không gửi email. Hạn nộp là 1~15/11, không phải 29/11. Video gửi email, không nộp trực tiếp."}, {"n": 10, "section": "※ [9~12] 다음 글 또는 그래프의 내용과 같은 것을 고르십시오.", "reading": "택배 배송 물품 비율: 식품 31%, 의류 25%, 화장품 19%, 전자 제품 13%, 운동 용품 8%, 기타 4%", "q": "내용과 같은 것을 고르십시오.", "o": ["택배로 배송되는 물건 중 의류가 가장 많다.", "택배로 화장품이 배송되는 비율이 식품보다 낮다.", "택배로 운동 용품이 배송되는 비율은 10%가 넘는다.", "택배로 전자 제품이 배송되는 비율이 두 번째로 높다."], "a": 1, "ex": "Đúng là ②. 화장품 19% thấp hơn 식품 31%. Sai: nhiều nhất là 식품, 운동 용품 chỉ 8%, 전자 제품 13% không đứng thứ hai."}, {"n": 11, "section": "※ [9~12] 다음 글 또는 그래프의 내용과 같은 것을 고르십시오.", "reading": "인주로봇연구소는 작년에 이어 올해에도 겨울 방학을 맞은 인주시 초등학생들을 대상으로 교육 프로그램을 운영한다. 참여 학생들은 연구소에서 직접 로봇을 만들어 보고 조종하는 체험을 할 수 있다. 이 프로그램은 로봇 과학자가 되기를 희망하는 학생들에게 특히 반응이 좋다. 연구소는 내년 겨울 방학에도 이 프로그램을 진행할 예정이다.", "q": "내용과 같은 것을 고르십시오.", "o": ["이 프로그램은 올해 처음 시작됐다.", "내년에는 이 프로그램이 학기 중에 진행된다.", "연구소의 과학자가 학교로 직접 가서 교육을 해 준다.", "이 프로그램은 로봇 과학자를 꿈꾸는 학생들에게 인기가 많다."], "a": 3, "ex": "Đúng là ④. Bài nói chương trình được học sinh muốn trở thành nhà khoa học robot hưởng ứng tốt. ① sai vì ‘작년에 이어 올해에도’ cho biết không phải năm nay mới bắt đầu."}, {"n": 12, "section": "※ [9~12] 다음 글 또는 그래프의 내용과 같은 것을 고르십시오.", "reading": "지난 23일 한 차량이 산길에서 미끄러지는 사고가 발생했다. 운전하던 김 씨가 의식을 잃자 함께 있던 김 씨의 개가 차에서 빠져나와 근처 마을로 달려갔다. 마을 사람들이 개를 따라가 김 씨를 발견했고 신고로 병원에 옮겨졌다.", "q": "내용과 같은 것을 고르십시오.", "o": ["김 씨는 개를 근처 마을로 보냈다.", "김 씨는 등산을 하다가 사고를 당했다.", "마을 사람들이 키우던 개가 김 씨를 발견했다.", "사람들은 개를 따라가 사고가 난 것을 알게 되었다."], "a": 3, "ex": "Đúng là ④. Người dân thấy chó sủa lạ, đi theo và phát hiện ông Kim gặp tai nạn. Không phải ông Kim cố ý gửi chó đi, cũng không phải tai nạn khi leo núi."}, {"n": 13, "section": "※ [13~15] 다음을 순서에 맞게 배열한 것을 고르십시오.", "reading": "(가) 대학생 때 처음으로 해외여행을 가게 되었다.\n(나) 가족들은 그 엽서를 받고 아주 감동적이었다고 했다.\n(다) 여행지에서 가족들을 위한 선물을 사고 싶었는데 돈이 별로 없었다.\n(라) 고민하다가 그 나라 풍경이 담긴 엽서에 여행 이야기를 담아 보냈다.", "q": "순서에 맞게 배열한 것을 고르십시오.", "o": ["가-나-라-다", "가-다-라-나", "다-나-가-라", "다-라-나-가"], "a": 1, "ex": "Đúng là ②. Trình tự: lần đầu đi du lịch nước ngoài → muốn mua quà nhưng ít tiền → nghĩ ra cách gửi bưu thiếp → gia đình nhận bưu thiếp và cảm động."}, {"n": 14, "section": "※ [13~15] 다음을 순서에 맞게 배열한 것을 고르십시오.", "reading": "(가) 고리 모양의 반죽은 기름에 골고루 튀겨져 전체가 잘 익었다.\n(나) 그런데 동그란 반죽의 가운데 부분이 익지 않는 경우가 많았다.\n(다) 도넛은 원래 밀가루를 동그랗게 반죽해 기름에 튀겨서 만들었다.\n(라) 어떤 사람이 도넛 반죽의 가운데를 파내 고리 모양으로 만들었다.", "q": "순서에 맞게 배열한 것을 고르십시오.", "o": ["가-다-나-라", "가-라-다-나", "다-나-라-가", "다-라-가-나"], "a": 2, "ex": "Đúng là ③. Ban đầu donut là bột tròn chiên dầu → phần giữa hay không chín → có người khoét giữa thành vòng → vòng bột chín đều."}, {"n": 15, "section": "※ [13~15] 다음을 순서에 맞게 배열한 것을 고르십시오.", "reading": "(가) 또한 고양이는 수염으로 기분을 드러내기도 한다.\n(나) 고양이는 높고 좁은 담 위에서도 흔들림 없이 걷는다.\n(다) 수염으로 바람의 방향을 느끼며 몸의 균형을 잡기 때문이다.\n(라) 두려울 때는 수염을 뒤쪽으로 당기고 편안할 때는 아래로 내린다.", "q": "순서에 맞게 배열한 것을 고르십시오.", "o": ["나-다-가-라", "나-라-가-다", "라-가-나-다", "라-나-다-가"], "a": 0, "ex": "Đúng là ①. Nói mèo đi vững trên tường hẹp → giải thích nhờ râu cảm nhận gió và giữ thăng bằng → thêm ý râu thể hiện tâm trạng → ví dụ khi sợ/thoải mái."}, {"n": 16, "section": "※ [16~18] (     )에 들어갈 말로 가장 알맞은 것을 고르십시오.", "reading": "영화 속 장면에서 전화번호가 나오는 경우가 있다. 실제 전화번호를 사용하면 호기심에 전화하는 사람이 생겨서 이 번호를 사용하는 사람은 일상생활이 힘들어질 수 있다. 영화진흥위원회에서는 이와 같은 (     ) 영화에 나와도 상관없는 전화번호를 확보해 두고 이를 영화 제작사에 제공해 주고 있다.", "q": "빈칸에 들어갈 말로 가장 알맞은 것을 고르십시오.", "o": ["사실을 화면에 담고자", "피해를 막기 위해", "제작 방법을 알리기 위해", "관객 요구를 반영하고자"], "a": 1, "ex": "Đúng là ②. Vì dùng số điện thoại thật có thể gây phiền toái cho chủ số, nên ủy ban cung cấp số an toàn để ngăn thiệt hại."}, {"n": 17, "section": "※ [16~18] (     )에 들어갈 말로 가장 알맞은 것을 고르십시오.", "reading": "30년 전 전문가들은 40년 후 석유가 남아 있지 않을 거라고 경고했다. 그러나 현재 전문가들은 앞으로도 50년 이상 석유를 사용할 수 있을 거라고 예측한다. 이렇게 석유의 (     ) 이유는 석유를 찾는 기술이 발전했기 때문이다.", "q": "빈칸에 들어갈 말로 가장 알맞은 것을 고르십시오.", "o": ["가격이 상승하고 있는", "품질이 더 좋아진", "가치가 계속해서 떨어지는", "사용 가능 기간이 늘어난"], "a": 3, "ex": "Đúng là ④. Trước đây dự đoán sắp hết dầu, hiện nay dự đoán còn dùng trên 50 năm, tức thời gian có thể sử dụng dầu đã tăng lên."}, {"n": 18, "section": "※ [16~18] (     )에 들어갈 말로 가장 알맞은 것을 고르십시오.", "reading": "수표교는 홍수 피해에 대비하기 위해 만든 조선 시대의 다리이다. 기둥에는 일정한 간격마다 표시가 되어 있어서 (     ) 쉽게 알 수 있었다. 담당자는 비가 오면 강물이 높아지는지를 확인했다.", "q": "빈칸에 들어갈 말로 가장 알맞은 것을 고르십시오.", "o": ["강물의 속도 차이를", "강물의 높이 변화를", "다리를 만든 재료를", "다리 기둥의 간격을"], "a": 1, "ex": "Đúng là ②. Các vạch trên cột cầu dùng để quan sát mực nước lên xuống, nên là sự thay đổi độ cao của nước sông."}, {"n": 19, "section": "※ [19~20] 다음을 읽고 물음에 답하십시오.", "reading": "좋은 생각을 끌어내려면 질문을 어떻게 할지 잘 고민해야 한다. 막연한 질문은 대답이 잘 나오지 않는다. (     ) ‘지금까지의 제품에서 무엇을 개선할까?’라고 질문하면 구체적인 답이 나온다.", "q": "빈칸에 들어갈 말로 가장 알맞은 것을 고르십시오.", "o": ["특히", "결코", "비록", "반면"], "a": 3, "ex": "Đúng là ④ 반면. Hai ý đối lập: câu hỏi mơ hồ thì khó trả lời, ngược lại câu hỏi cụ thể thì có câu trả lời hữu ích."}, {"n": 20, "section": "※ [19~20] 다음을 읽고 물음에 답하십시오.", "reading": "좋은 생각을 끌어내려면 질문을 어떻게 할지 잘 고민해야 한다. 좋은 질문은 구체적인 답을 이끌어 낸다.", "q": "윗글의 주제로 가장 알맞은 것을 고르십시오.", "o": ["질문을 한 후에 생각할 시간을 줘야 한다.", "도움이 되는 답을 얻으려면 질문을 잘해야 한다.", "질문하기 전에 예상되는 답을 미리 생각해야 한다.", "추상적인 질문으로 자유로운 생각을 끌어내야 한다."], "a": 1, "ex": "Đúng là ②. Toàn đoạn nhấn mạnh muốn có câu trả lời hữu ích thì phải biết đặt câu hỏi tốt và cụ thể."}, {"n": 21, "section": "※ [21~22] 다음을 읽고 물음에 답하십시오.", "reading": "학생 수 감소로 폐교가 될 뻔한 산골 초등학교가 위기에서 벗어났다. 이 학교 선생님들은 (     ) 학교를 살릴 방법을 고민했다.", "q": "빈칸에 들어갈 말로 가장 알맞은 것을 고르십시오.", "o": ["눈을 딱 감고", "머리를 맞대고", "손에 땀을 쥐고", "목에 힘을 주고"], "a": 1, "ex": "Đúng là ② 머리를 맞대고 = cùng nhau bàn bạc, cùng suy nghĩ. Ngữ cảnh là các giáo viên cùng tìm cách cứu trường."}, {"n": 22, "section": "※ [21~22] 다음을 읽고 물음에 답하십시오.", "reading": "선생님들은 예술대학교에 협조를 요청해 악기 전문가를 구했다. 또 기업의 기부를 받아 유명 음악가와 함께하는 음악회도 개최했다. 이런 소문을 듣고 음악을 배우러 오는 학생들이 생겼다.", "q": "내용과 같은 것을 고르십시오.", "o": ["이 초등학교는 기업에 요청해 악기 전문가를 구했다.", "이 초등학교는 선생님들의 노력에도 학생 수가 줄었다.", "이 초등학교에서 개최한 음악회에 유명 음악가가 참여했다.", "이 초등학교 선생님들이 학생들에게 직접 악기를 가르쳤다."], "a": 2, "ex": "Đúng là ③. Bài nói trường tổ chức buổi hòa nhạc với nhạc sĩ nổi tiếng. Chuyên gia nhạc cụ được xin từ đại học nghệ thuật, không phải doanh nghiệp."}, {"n": 23, "section": "※ [23~24] 다음을 읽고 물음에 답하십시오.", "reading": "나는 운전면허를 따고 아빠의 차를 빌려 직접 출근했다. 그러나 운전하는 내내 다리가 후들후들 떨렸다. 운전대를 꼭 붙든 채 앞만 보고 도로를 달렸다.", "q": "‘나’의 심정으로 가장 알맞은 것을 고르십시오.", "o": ["기대되다", "긴장되다", "뿌듯하다", "창피하다"], "a": 1, "ex": "Đúng là ② 긴장되다. Chi tiết chân run và nắm chặt vô lăng cho thấy người nói rất căng thẳng."}, {"n": 24, "section": "※ [23~24] 다음을 읽고 물음에 답하십시오.", "reading": "퇴직한 아빠는 매일 아침 나를 직장까지 데려다주셨다. 나는 면허증을 받자마자 당분간 아빠의 차를 빌려 쓰기로 했다.", "q": "내용과 같은 것을 고르십시오.", "o": ["나는 아빠의 차를 운전해서 회사에 다녀왔다.", "나는 운전면허를 따기 전에 대중교통으로 출근했다.", "나는 운전면허를 따자마자 자동차를 새로 구매했다.", "나는 아빠의 조언 덕분에 운전하는 것이 어렵지 않았다."], "a": 0, "ex": "Đúng là ①. Người nói mượn xe của bố và tự lái đi làm. Không mua xe mới ngay."}, {"n": 25, "section": "※ [25~27] 다음 신문 기사의 제목을 가장 잘 설명한 것을 고르십시오.", "reading": "모처럼의 황금연휴, 여행사 예약 문의 ‘껑충’", "q": "제목을 가장 잘 설명한 것을 고르십시오.", "o": ["연휴가 짧아서 여행 상품을 찾는 예약 문의가 줄어들었다.", "값이 비싸더라도 연휴 기간에 여행을 가려는 사람이 많아졌다.", "오랜만에 오는 긴 연휴를 맞아 여행사에 예약 상담이 대폭 늘었다.", "매년 돌아오는 연휴를 앞두고 여행사마다 적극적인 홍보를 시작했다."], "a": 2, "ex": "Đúng là ③. 모처럼의 황금연휴 = kỳ nghỉ dài hiếm có; 예약 문의 껑충 = hỏi đặt tour tăng mạnh."}, {"n": 26, "section": "※ [25~27] 다음 신문 기사의 제목을 가장 잘 설명한 것을 고르십시오.", "reading": "김민수 ‘올해의 선수상’ 수상 유력, 야구팬들 기대 고조", "q": "제목을 가장 잘 설명한 것을 고르십시오.", "o": ["김민수가 상을 받아서 야구팬들이 매우 기뻐하고 있다.", "김민수가 야구팬들의 큰 기대에도 불구하고 상을 받지 못했다.", "김민수가 상을 받을 가능성이 많아 야구팬들의 기대가 높아지고 있다.", "김민수가 상을 받는 데 실패했지만 야구팬들에게 많은 응원을 받았다."], "a": 2, "ex": "Đúng là ③. 수상 유력 = có khả năng cao nhận giải; 기대 고조 = kỳ vọng tăng cao."}, {"n": 27, "section": "※ [25~27] 다음 신문 기사의 제목을 가장 잘 설명한 것을 고르십시오.", "reading": "지지부진한 태풍 피해 복구, 속 터지는 인주 주민들", "q": "제목을 가장 잘 설명한 것을 고르십시오.", "o": ["태풍 피해가 매년 발생해 인주 주민들이 대책을 요구했다.", "태풍 피해를 복구하는 일에 인주 주민들의 참여가 저조하다.", "태풍 피해를 막기 위한 방안이 인주 주민들에게 호응을 얻고 있다.", "태풍 피해 복구가 잘 진행되지 않아 인주 주민들이 답답해하고 있다."], "a": 3, "ex": "Đúng là ④. 지지부진하다 = trì trệ; 속 터지다 = bực bội/sốt ruột. Người dân bức xúc vì phục hồi thiệt hại do bão diễn ra chậm."}, {"n": 28, "section": "※ [28~31] (     )에 들어갈 말로 가장 알맞은 것을 고르십시오.", "reading": "인터넷 방송 채널 ‘지금 거기’는 하나의 장소를 편집 없이 그대로 보여 준다. 시청자들은 현장감 있는 풍경에 빠져들어 마치 (     ) 것처럼 느끼게 된다.", "q": "빈칸에 들어갈 말로 가장 알맞은 것을 고르십시오.", "o": ["오래된 영상을 보는", "전혀 가 본 적이 없는", "연예인과 방송에 출연하는", "직접 그곳에 가서 바라보는"], "a": 3, "ex": "Đúng là ④. Vì chương trình chiếu trực tiếp cảnh thật nên người xem cảm giác như đang trực tiếp đến nơi đó và nhìn cảnh đó."}, {"n": 29, "section": "※ [28~31] (     )에 들어갈 말로 가장 알맞은 것을 고르십시오.", "reading": "산조는 연주자가 악보대로 연주하는 것이 아니라 무대마다 다른 독주를 선보인다. 현장 분위기에 맞춰 (     ) 연주하기 때문에 같은 연주자의 공연을 여러 번 보아도 새롭다.", "q": "빈칸에 들어갈 말로 가장 알맞은 것을 고르십시오.", "o": ["여러 사람이 동시에", "다양한 변화를 주면서", "새로운 악기를 더하여", "악보를 보면서 그대로"], "a": 1, "ex": "Đúng là ②. Từ khóa 즉흥적으로, 무대마다 다른 독주 cho thấy người chơi tạo nhiều biến hóa theo không khí hiện trường."}, {"n": 30, "section": "※ [28~31] (     )에 들어갈 말로 가장 알맞은 것을 고르십시오.", "reading": "비닐장갑은 기름에 친화적인 폴리에틸렌으로 만들어져 기름이 잘 스며든다. 게다가 두께가 매우 얇아 기름이 (     ) 수 있다.", "q": "빈칸에 들어갈 말로 가장 알맞은 것을 고르십시오.", "o": ["손에 전혀 묻지 않을", "치킨의 맛을 떨어뜨릴", "비닐을 부드럽게 만들", "장갑을 더 쉽게 통과할"], "a": 3, "ex": "Đúng là ④. Bài giải thích vì sao đeo găng nilon vẫn dính dầu: dầu thấm vào vật liệu và đi qua găng tay mỏng."}, {"n": 31, "section": "※ [28~31] (     )에 들어갈 말로 가장 알맞은 것을 고르십시오.", "reading": "상품 선택이 어려워지면서 유명인이 추천하는 물건을 고민 없이 따라 사는 경향이 생겼다. 영향력 있는 인물이 (     ) 짧은 시간 안에 최선의 선택을 할 수 있을 것이라는 믿음이 반영된 것이다.", "q": "빈칸에 들어갈 말로 가장 알맞은 것을 고르십시오.", "o": ["직접 물건을 보내 주면", "높은 가격으로 판매하면", "선택한 것을 그대로 따르면", "상품을 생산하도록 도와주면"], "a": 2, "ex": "Đúng là ③. Chủ đề là mua theo lựa chọn của người nổi tiếng để tiết kiệm thời gian và tránh thất bại."}, {"n": 32, "section": "※ [32~34] 다음을 읽고 글의 내용과 같은 것을 고르십시오.", "reading": "연구팀은 10년간 기린을 촬영하고 분석했다. 암컷 기린이 4~5세가 되면 목이 차지하는 비율이 더 커진다. 임신으로 영양이 많이 필요한 나이에 더 높은 나뭇잎까지 먹으려고 하면서 목이 길어지는 것이다.", "q": "내용과 같은 것을 고르십시오.", "o": ["연구팀은 올해부터 기린을 촬영하기 시작했다.", "4~5세부터 암컷 기린은 먹이를 먹는 양을 줄인다.", "암컷 기린은 임신을 하는 시기에 목이 더 길어진다.", "연구팀은 기린의 목 길이가 먹이와 관련이 없다고 보았다."], "a": 2, "ex": "Đúng là ③. Bài nói ở giai đoạn mang thai/cần dinh dưỡng, hươu cao cổ cái cố ăn lá cao hơn nên cổ dài hơn."}, {"n": 33, "section": "※ [32~34] 다음을 읽고 글의 내용과 같은 것을 고르십시오.", "reading": "나이팅게일은 군 병원에서 사망 환자 수와 사망 원인을 기록해 위생 문제로 감염되어 사망하는 병사가 많다는 것을 통계로 입증했다. 그리고 이 결과를 도표로 만들어 관계자들을 설득했다.", "q": "내용과 같은 것을 고르십시오.", "o": ["나이팅게일은 통계 자료를 근거로 관계자들을 설득했다.", "나이팅게일은 부상으로 죽는 병사가 가장 많다는 것을 밝혀냈다.", "나이팅게일의 기록에는 병원 내 감염자 수가 포함되어 있지 않았다.", "나이팅게일이 일을 시작했을 당시에는 병원의 위생 관리가 철저했다."], "a": 0, "ex": "Đúng là ①. Bài nói rõ bà chứng minh bằng thống kê và dùng biểu đồ để thuyết phục người liên quan."}, {"n": 34, "section": "※ [32~34] 다음을 읽고 글의 내용과 같은 것을 고르십시오.", "reading": "쇼트 트랙은 날을 왼쪽으로 기울여 고정한다. 반면 피겨 스케이트는 날 앞쪽을 큰 톱니 모양으로 만든다. 선수들이 공중으로 뛰어오를 때 날 앞쪽을 사용해 빙판을 찍으면 더 높이 뛸 수 있다.", "q": "내용과 같은 것을 고르십시오.", "o": ["쇼트 트랙은 스케이트의 날이 톱니 모양으로 되어 있다.", "피겨 선수들은 높이 뛰어오르기 위해 날의 앞부분을 사용한다.", "피겨에서는 선수가 넘어지지 않도록 스케이트의 날 앞쪽을 둥글게 했다.", "쇼트 트랙에서는 스케이트 날을 똑바로 달아 코너를 잘 돌 수 있게 했다."], "a": 1, "ex": "Đúng là ②. Bài nói rõ vận động viên trượt băng nghệ thuật dùng phần trước của lưỡi giày để bật nhảy cao hơn."}, {"n": 35, "section": "※ [35~38] 다음을 읽고 글의 주제로 가장 알맞은 것을 고르십시오.", "reading": "메타세쿼이아는 가로수로 선호되지만 심을 장소에 유의해야 한다. 생장이 빨라 도로 주변 건물의 벽을 갈라지게 하거나 채광을 가리는 피해를 줄 수 있다.", "q": "주제로 가장 알맞은 것을 고르십시오.", "o": ["메타세쿼이아는 생장이 느려 가로수로 적절하지 않다.", "메타세쿼이아를 도로에 심으면 도시 경관을 개선할 수 있다.", "메타세쿼이아는 적합한 장소에 심지 않으면 문제가 될 수 있다.", "메타세쿼이아가 자라는 높이는 뿌리 내리는 장소에 따라 달라진다."], "a": 2, "ex": "Đúng là ③. Chủ đề là cây có thể gây vấn đề nếu trồng ở nơi không phù hợp, không phải cây không tốt hoàn toàn."}, {"n": 36, "section": "※ [35~38] 다음을 읽고 글의 주제로 가장 알맞은 것을 고르십시오.", "reading": "인공 강우 기술로 미세 먼지를 줄이려는 실험이 있지만, 현재 기술은 구름이 있는 지역에서만 활용할 수 있고 만들 수 있는 비의 양도 많지 않다.", "q": "주제로 가장 알맞은 것을 고르십시오.", "o": ["인공 강우 기술이 상용화되도록 실험을 지속해야 한다.", "미세 먼지를 줄이기 위해서는 국가 간 협력이 필수적이다.", "미세 먼지 문제를 해결하기 위해서는 재정적인 지원이 중요하다.", "인공 강우 기술은 미세 먼지를 줄이는 해결책으로는 한계가 있다."], "a": 3, "ex": "Đúng là ④. Bài nhấn mạnh hạn chế của mưa nhân tạo: chỉ dùng khi có mây và lượng mưa tạo ra không nhiều."}, {"n": 37, "section": "※ [35~38] 다음을 읽고 글의 주제로 가장 알맞은 것을 고르십시오.", "reading": "건강세는 건강에 해로운 식품에 부과하는 세금이다. 소비 억제, 성인병 환자 감소, 국민 건강 증진 재원 확보 효과가 있으므로 도입을 긍정적으로 검토해야 한다.", "q": "주제로 가장 알맞은 것을 고르십시오.", "o": ["건강세는 소비자의 부담을 최소화하는 선에서 부과되어야 한다.", "건강세를 도입하기 전에 국민의 의견을 파악하는 것이 중요하다.", "건강세는 국민의 건강 증진에 도움이 되므로 도입할 필요가 있다.", "건강세를 부과할 식품을 선정할 때는 명확한 기준이 있어야 한다."], "a": 2, "ex": "Đúng là ③. Tác giả nêu nhiều lợi ích của thuế sức khỏe và kết luận nên xem xét tích cực việc áp dụng."}, {"n": 38, "section": "※ [35~38] 다음을 읽고 글의 주제로 가장 알맞은 것을 고르십시오.", "reading": "국회는 다양한 세대의 의원들로 구성되어야 한다. 청년 세대는 사회 변화에 맞는 정책을 제안하고 청년 정책에 목소리를 낼 수 있으므로 정치 활동을 보장할 필요가 있다.", "q": "주제로 가장 알맞은 것을 고르십시오.", "o": ["청년들이 국회에 활발하게 진출하도록 해야 한다.", "청년 세대의 문제에 대해 정치권의 관심이 필요하다.", "청년들이 제안하는 정책을 채택하는 비율을 높여야 한다.", "청년 정치인은 정치적 기반을 갖추기 위해 노력해야 한다."], "a": 0, "ex": "Đúng là ①. Trọng tâm là cần bảo đảm để thanh niên tham gia Quốc hội nhiều hơn."}, {"n": 39, "section": "※ [39~41] 주어진 문장이 들어갈 곳으로 가장 알맞은 것을 고르십시오.", "reading": "주어진 문장: 섬유질이 마르는 과정에서 자연스레 틀의 자국이 남았는데 이를 워터마크라고 불렀다.\n\n고대 이집트에서는 물에 푼 섬유질을 틀에 올려 건조하는 방식으로 종이를 만들었다. (㉠) 이후 제지업자들이 틀에 고유의 문양을 새겨 자신만의 워터마크를 남기기 시작했다. (㉡) 이것이 이어져 저작권 표시나 위조 방지를 위해 문서나 지폐 등에 워터마크를 넣게 되었다. (㉢) 지금도 저작권 보호 용도로 활용된다. (㉣)", "q": "문장이 들어갈 곳을 고르십시오.", "o": ["㉠", "㉡", "㉢", "㉣"], "a": 0, "ex": "Đúng là ①. Câu cho sẵn giải thích dấu vết của khuôn sau quá trình làm giấy bằng khuôn, nên đặt ngay sau câu giới thiệu cách làm giấy ở Ai Cập cổ."}, {"n": 40, "section": "※ [39~41] 주어진 문장이 들어갈 곳으로 가장 알맞은 것을 고르십시오.", "reading": "주어진 문장: 해양 생물이 서식하던 바닷속 모래 언덕이나 골짜기가 파괴되는 것이다.\n\n콘크리트를 만들기 위해서는 모래나 자갈 같은 골재가 필요하다. (㉠) 바다에서는 질 좋은 골재를 쉽게 얻을 수 있다. (㉡) 과다한 골재 채취로 바닷속 지형이 바뀌는 경우가 많다. (㉢) 이에 규제를 시행하여 해양 생태계를 보호하려는 노력이 이어지고 있다. (㉣)", "q": "문장이 들어갈 곳을 고르십시오.", "o": ["㉠", "㉡", "㉢", "㉣"], "a": 2, "ex": "Đúng là ③. Câu cho sẵn giải thích cụ thể hậu quả của việc địa hình dưới biển bị thay đổi, nên đặt ngay sau câu nói về việc địa hình bị thay đổi."}, {"n": 41, "section": "※ [39~41] 주어진 문장이 들어갈 곳으로 가장 알맞은 것을 고르십시오.", "reading": "주어진 문장: 상철은 저마다의 사연을 안고 편의점을 찾은 손님들에게 따스한 위로를 건넨다.\n\n소설 『이상한 편의점』이 해외에서도 호평받고 있다. (㉠) 이 책은 편의점에서 일하게 된 노숙자 상철과 손님들의 일화를 담고 있다. (㉡) 이 책이 해외 독자들의 마음까지 울리는 이유가 바로 이 따뜻함에 있다. (㉢) 지친 삶에 응원이 필요한 모든 이에게 권한다. (㉣)", "q": "문장이 들어갈 곳을 고르십시오.", "o": ["㉠", "㉡", "㉢", "㉣"], "a": 1, "ex": "Đúng là ②. Câu cho sẵn tiếp nối câu giới thiệu nhân vật Sang-cheol và khách hàng, đồng thời giải thích ‘sự ấm áp’ ở câu sau."}, {"n": 42, "section": "※ [42~43] 다음을 읽고 물음에 답하십시오.", "reading": "※ Đoạn văn gốc trong bản công khai bị hạn chế hiển thị. Luyện theo câu hỏi và đáp án.", "q": "밑줄 친 부분에 나타난 ‘재헌’의 심정으로 가장 알맞은 것을 고르십시오.", "o": ["허전하다", "대견하다", "감격스럽다", "못마땅하다"], "a": 2, "ex": "Đúng là ③ 감격스럽다 = cảm động, xúc động. Các lựa chọn khác: 허전하다 trống trải, 대견하다 tự hào, 못마땅하다 không hài lòng."}, {"n": 43, "section": "※ [42~43] 다음을 읽고 물음에 답하십시오.", "reading": "※ Đoạn văn gốc trong bản công khai bị hạn chế hiển thị. Luyện theo câu hỏi và đáp án.", "q": "윗글의 내용으로 알 수 있는 것을 고르십시오.", "o": ["아내는 지금 처제와 함께 있다.", "처제는 아내와 성격이 비슷하다.", "아내의 출산 예정 시간이 이미 지났다.", "재헌은 아내가 있는 곳에 막 도착했다."], "a": 0, "ex": "Đúng là ①. Theo đáp án của đề, thông tin suy ra được là người vợ hiện đang ở cùng 처제."}, {"n": 44, "section": "※ [44~45] 다음을 읽고 물음에 답하십시오.", "reading": "그라피티는 길거리 벽면에 낙서처럼 그리거나 스프레이 페인트를 뿌려서 그리는 그림이다. 공공장소 벽면 등에 주로 그려진 그라피티는 사회 비판적인 메시지를 표현하는 경우가 많았다. 권력에 대한 (     ) 소수와 약자의 목소리를 담은 것이다.", "q": "( )에 들어갈 말로 가장 알맞은 것을 고르십시오.", "o": ["불신을 없애며", "저항 정신을 드러내며", "태도를 수동적으로 취하며", "우호적 반응을 이끌어 내며"], "a": 1, "ex": "Đúng là ②. Từ khóa ‘사회 비판적인 메시지’, ‘권력에 대한’, ‘소수와 약자의 목소리’ cho thấy nội dung là tinh thần phản kháng trước quyền lực."}, {"n": 45, "section": "※ [44~45] 다음을 읽고 물음에 답하십시오.", "reading": "오늘날 그라피티는 친숙함을 무기로 일상생활 속에 스며들어 사람들의 인식을 바꾸었다. 사람들은 그라피티의 예술적 가치에도 주목하기 시작했고, 현대 미술에서 제자리를 확고히 하고 있다.", "q": "윗글의 주제로 가장 알맞은 것을 고르십시오.", "o": ["그라피티는 도시 환경을 훼손하는 문제점을 가지고 있다.", "그라피티는 길거리 낙서로서의 한계를 뛰어넘지 못하고 있다.", "과거의 그라피티는 주류 문화의 중심에서 대중의 사랑을 받았다.", "오늘날의 그라피티는 과거와 달리 예술적 가치를 인정받고 있다."], "a": 3, "ex": "Đúng là ④. Đoạn văn nhấn mạnh graffiti ngày nay khác quá khứ, đã được công nhận giá trị nghệ thuật."}, {"n": 46, "section": "※ [46~47] 다음을 읽고 물음에 답하십시오.", "reading": "국가 무형 문화재는 형체가 없으므로 기능 보유자를 인간문화재로 지정해 보존하도록 한다. 그런데 전수받으려는 사람이 줄고 있어 문화재 보존에 비상등이 켜졌다. 기능 전수 기간에는 경제적 지원도 없어 명맥이 끊일 수 있다는 우려가 있다.", "q": "필자의 태도로 가장 알맞은 것을 고르십시오.", "o": ["인간문화재가 앞으로 더 많이 배출될 것을 기대하고 있다.", "국가 무형 문화재의 전수가 단절되어 가는 것을 우려하고 있다.", "인간문화재가 되기 위해 노력하는 사람의 자세에 감탄하고 있다.", "국가 무형 문화재의 선정 절차를 투명하게 할 것을 요구하고 있다."], "a": 1, "ex": "Đúng là ②. Các cụm ‘비상등이 켜졌다’, ‘명맥이 끊일 수 있다’ thể hiện sự lo ngại việc truyền thừa văn hóa phi vật thể bị gián đoạn."}, {"n": 47, "section": "※ [46~47] 다음을 읽고 물음에 답하십시오.", "reading": "국가 무형 문화재는 형체가 없으므로 기능을 보유한 사람을 인간문화재로 지정해 이들을 통해 문화재가 보존되도록 한다.", "q": "내용과 같은 것을 고르십시오.", "o": ["국가 무형 문화재에 대한 법적 근거가 존재하지 않는다.", "국가 무형 문화재는 그 기능을 보유한 인간문화재를 통해 전수된다.", "국가 무형 문화재 기능을 전수받는 동안 경제적 지원을 받을 수 있다.", "국가 무형 문화재로 인정받으려면 원형을 시대에 맞게 변형해야 한다."], "a": 1, "ex": "Đúng là ②. Vì văn hóa phi vật thể không có hình thể, nên được bảo tồn và truyền lại thông qua người nắm giữ kỹ năng, tức 인간문화재."}, {"n": 48, "section": "※ [48~50] 다음을 읽고 물음에 답하십시오.", "reading": "도심 교통 혼잡이 심해지면서 새 건축물은 사전에 교통 영향 평가를 받는다. 하지만 이러한 방법만으로는 효과가 제한적이므로 여러 정책을 전방위적으로 시행할 필요가 있다.", "q": "글을 쓴 목적으로 가장 알맞은 것을 고르십시오.", "o": ["교통 영향 평가의 부정적 효과를 강조하기 위해서", "교통 유발 부담금 제도를 도입한 취지를 알리기 위해서", "교통 문제 해결을 위한 방안의 다각화를 주장하기 위해서", "교통 상황을 개선한 경우 받게 되는 혜택을 소개하기 위해서"], "a": 2, "ex": "Đúng là ③. Tác giả nói các biện pháp hiện tại có giới hạn và cần thực hiện nhiều chính sách cùng lúc để giải quyết giao thông đô thị."}, {"n": 49, "section": "※ [48~50] 다음을 읽고 물음에 답하십시오.", "reading": "이 평가 결과를 반영해 건축물과 지하철, 버스 등 대중교통 수단의 연계성을 높여 대중교통 이용을 유도함으로써 (     ) 것이 대표적인 사례이다.", "q": "( )에 들어갈 말로 가장 알맞은 것을 고르십시오.", "o": ["교통 정체가 유발된", "건축 기간이 연장된", "주변 교통량을 감축한", "주차장 규모를 확대한"], "a": 2, "ex": "Đúng là ③. Liên kết tòa nhà với tàu điện/người đi xe buýt nhằm khuyến khích dùng phương tiện công cộng, từ đó giảm lưu lượng giao thông xung quanh."}, {"n": 50, "section": "※ [48~50] 다음을 읽고 물음에 답하십시오.", "reading": "교통 혼잡을 유발하는 시설의 소유자에게 교통 유발 부담금을 부과하는 제도도 시행하고 있다.", "q": "내용과 같은 것을 고르십시오.", "o": ["교통 영향 평가는 도심에 건축물을 짓고 난 후에 시행한다.", "교통 영향 평가는 도심에 유입되는 인구를 늘리기 위해 실시한다.", "교통 혼잡 해결을 위해 노력하는 건축물의 소유자는 혜택을 받고 있다.", "교통 혼잡을 일으키는 시설의 소유자는 그에 따른 부담금을 내야 한다."], "a": 3, "ex": "Đúng là ④. Bài nêu rõ chủ sở hữu cơ sở gây ùn tắc giao thông phải nộp khoản phí gây phát sinh giao thông."}];

 quiz.innerHTML="";
 questions.forEach((item,idx)=>{

  block.dataset.search=(item.section+" "+item.reading+" "+item.q+" "+item.o.join(" ")+" "+item.ex).toLowerCase();
  block.innerHTML=`
   <div class="section-title">${esc(item.section)}</div>
   ${item.reading ? `<div class="reading">${esc(item.reading)}</div>` : ""}
   <div class="question-title"><b>${item.n}.</b> ${esc(item.q)}</div>
   <div class="options">
     ${item.o.map((o,i)=>`<button type="button" class="option" data-q="${idx}" data-i="${i}">${["①","②","③","④"][i]} ${esc(o)}</button>`).join("")}
   </div>
   <div class="result" id="result-${idx}"></div>
   <div class="explain" id="explain-${idx}">
     <b>Đáp án đúng: ${["①","②","③","④"][item.a]} ${esc(item.o[item.a])}</b><br><br>
     <b>Giải thích tiếng Việt:</b><br>${esc(item.ex)}
   </div>`;
  quiz.appendChild(block);
 });
}
function check(el,qidx,i){
 const item=questions[qidx];
 const opts=el.closest(".options").querySelectorAll(".option");
 const result=document.getElementById("result-"+qidx);
 const explain=document.getElementById("explain-"+qidx);
 opts.forEach(o=>o.classList.remove("wrong","correct"));
 if(i===item.a){
   el.classList.add("correct");
   result.innerHTML="✅ Chính xác";
   result.style.color="#15803d";
   explain.style.display="block";
   if(!answered[item.n]){answered[item.n]=true; done++; correct++; update();}
 } else {
   el.classList.add("wrong");
   result.innerHTML="❌ Sai rồi, hãy chọn lại";
   result.style.color="#dc2626";
   explain.style.display="none";
   wrong++; update();
   setTimeout(()=>el.classList.remove("wrong"),700);
 }
}
function update(){
 document.getElementById("done").innerText=done;
 document.getElementById("correct").innerText=correct;
 document.getElementById("wrong").innerText=wrong;
 document.getElementById("bar").style.width=(done/questions.length*100)+"%";
}
function resetQuiz(){
 done=0; correct=0; wrong=0; answered={};
 render(); update(); document.getElementById("search").value="";
}
quiz.addEventListener("click",e=>{
 const opt=e.target.closest(".option"); if(!opt)return;
 check(opt,Number(opt.dataset.q),Number(opt.dataset.i));
});
document.getElementById("search").addEventListener("input",e=>{
 const kw=e.target.value.trim().toLowerCase();
 document.querySelectorAll(".block").forEach(b=>b.classList.toggle("hidden",kw && !b.dataset.search.includes(kw)));
});
render(); update();
</script>
</body>
</html>
