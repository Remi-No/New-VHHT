const quiz=document.getElementById("quiz");

questions.forEach((item,index)=>{

    const div=document.createElement("div");
    div.className="question";

    let html=`<h3>${item.q}</h3>`;

    item.options.forEach((opt,i)=>{

        html+=`
        <div class="option"
             onclick="checkAnswer(${index},${i},this)">
             ${opt}
        </div>
        `;
    });

    html+=`<div class="feedback" id="feedback-${index}"></div>`;

    div.innerHTML=html;

    quiz.appendChild(div);

});

let score=0;
let answered=[];

function checkAnswer(qIndex,selected,element){

    if(answered[qIndex]) return;

    const feedback=document.getElementById(`feedback-${qIndex}`);
    const options=element.parentElement.querySelectorAll(".option");

    if(selected===questions[qIndex].answer){

        element.classList.add("correct");

        feedback.innerHTML="✔ Chính xác!";
        feedback.className="feedback correct";

        answered[qIndex]=true;
        score++;

        options.forEach(opt=>{
            opt.classList.add("locked");
        });

    }else{

        element.classList.add("wrong");

        feedback.innerHTML="✘ Sai, hãy chọn lại!";
        feedback.className="feedback wrong";

        setTimeout(()=>{
            element.classList.remove("wrong");
        },600);
    }
}

document.getElementById("submitBtn").onclick=function(){

    const result=document.getElementById("result");

    result.style.display="block";

    result.innerHTML=`
        Bạn đúng <span style="color:#0d47a1">${score}</span> / ${questions.length} câu
    `;

    window.scrollTo({
        top:document.body.scrollHeight,
        behavior:"smooth"
    });
};
